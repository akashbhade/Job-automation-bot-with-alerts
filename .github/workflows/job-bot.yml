name: Job Automation Bot

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run bot
        run: npx ts-node naukri-job-bot.ts
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASS: ${{ secrets.PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          RUN_TYPE: instant
